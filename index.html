<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ToBE Tech</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#04060f;--panel:#070b1c;--bdr:#192450;--blue:#1a56e8;--cyan:#00c8ff;--text:#92b4d8;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:400;
  background:repeating-linear-gradient(0deg,transparent 0,transparent 2px,rgba(0,0,0,.1) 2px,rgba(0,0,0,.1) 4px);}
#scene{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
#terminal{width:min(920px,92vw);height:min(560px,82vh);background:var(--panel);
  border:1px solid var(--bdr);border-radius:10px;
  box-shadow:0 0 0 1px rgba(26,86,232,.07),0 0 60px rgba(26,86,232,.12),0 40px 100px rgba(0,0,0,.85);
  display:flex;flex-direction:column;overflow:hidden;
  opacity:0;transform:translateY(24px);transition:opacity .5s,transform .5s;}
#terminal.show{opacity:1;transform:translateY(0);}
#tbar{display:flex;align-items:center;gap:7px;padding:10px 16px;
  background:rgba(255,255,255,.025);border-bottom:1px solid var(--bdr);flex-shrink:0;}
.dot{width:12px;height:12px;border-radius:50%;}
.dr{background:#ff5f56}.dy{background:#ffbd2e}.dg{background:#27c93f}
#tbar-label{flex:1;text-align:center;font:12px/1 'Courier New',monospace;
  color:rgba(146,180,216,.4);letter-spacing:.08em;}
#code-wrap{flex:1;padding:18px 22px;overflow:hidden;}
#code-out{font:clamp(11px,1.35vw,13px)/1.7 'Courier New',monospace;white-space:pre;color:var(--text);}
#build-panel{border-top:1px solid var(--bdr);padding:12px 22px 14px;flex-shrink:0;
  font:12px/1.85 'Courier New',monospace;}
.bl{opacity:0;transform:translateX(-8px);transition:opacity .25s,transform .25s;}
.bl.show{opacity:1;transform:translateX(0);}
#prog-wrap{display:flex;align-items:center;gap:12px;margin-top:6px;opacity:0;transition:opacity .3s;}
#prog-wrap.show{opacity:1;}
#prog-bar{flex:1;height:2px;background:rgba(26,86,232,.18);border-radius:1px;overflow:hidden;}
#prog-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--blue),var(--cyan));
  box-shadow:0 0 8px var(--cyan);transition:width 1.5s cubic-bezier(.4,0,.2,1);}
#prog-pct{font-size:11px;color:var(--cyan);min-width:34px;text-align:right;}
#flash{position:fixed;inset:0;z-index:350;background:#fff;opacity:0;pointer-events:none;}
#logo-scene{position:fixed;inset:0;z-index:100;display:flex;align-items:center;
  justify-content:center;background:var(--bg);opacity:0;pointer-events:none;}
#logo-scene.on{pointer-events:auto;}
#pcanvas{position:absolute;inset:0;width:100%;height:100%;z-index:1;}
#rings-layer{position:absolute;inset:0;z-index:2;pointer-events:none;}
.ring{position:absolute;border-radius:50%;border-style:solid;left:50%;top:50%;transform-origin:center;}
#logo-wrap{position:relative;width:min(420px,80vw);z-index:10;}
#logo-wrap img{width:100%;display:block;position:absolute;top:0;left:0;}
#logo-wrap img:last-child{position:relative;}
#glow{position:absolute;inset:-65%;z-index:-1;
  background:radial-gradient(ellipse,rgba(26,86,232,.8) 0%,rgba(0,200,255,.3) 36%,transparent 62%);
  filter:blur(50px);opacity:0;}
#g1,#g2,#g3,#g4{position:absolute;top:0;left:0;width:100%;opacity:0;}
@keyframes cur{50%{opacity:0}}
@keyframes flashBurst{0%{opacity:0}12%{opacity:1}100%{opacity:0}}
@keyframes ringOut{0%{opacity:.9;transform:translate(-50%,-50%) scale(0);}
  100%{opacity:0;transform:translate(-50%,-50%) scale(6);}}
@keyframes glowBurst{0%{opacity:0;transform:scale(.35);}45%{opacity:1;transform:scale(1.8);}
  100%{opacity:.9;transform:scale(1.55);}}
@keyframes glowPulse{0%,100%{opacity:.85;transform:scale(1.55);}50%{opacity:1;transform:scale(1.7);}}
@keyframes logoReveal{
  0%{opacity:0;filter:saturate(0) brightness(9);transform:scale(.65);}
  14%{opacity:1;filter:saturate(0) brightness(4.5);transform:scale(1.25);}
  44%{opacity:1;filter:saturate(.25) brightness(2.2);transform:scale(.94);}
  70%{opacity:1;filter:saturate(.78) brightness(1.18);transform:scale(1.05);}
  100%{opacity:1;filter:saturate(1) brightness(1);transform:scale(1);}}
@keyframes g1a{
  0%,100%{opacity:0}
  5%{opacity:.95;clip-path:inset(8% 0 58% 0);transform:translateX(-18px);
    filter:hue-rotate(180deg) saturate(9) brightness(2.5);}
  12%{opacity:.8;clip-path:inset(52% 0 10% 0);transform:translateX(18px);
    filter:hue-rotate(90deg) saturate(7);}
  19%{opacity:.5;clip-path:inset(22% 0 40% 0);transform:translateX(-10px);filter:hue-rotate(270deg);}
  28%{opacity:.2;clip-path:inset(65% 0 5% 0);transform:translateX(5px);}
  38%{opacity:0}}
@keyframes g2a{
  0%,100%{opacity:0}
  8%{opacity:.85;clip-path:inset(42% 0 28% 0);transform:translateX(15px);
    filter:hue-rotate(240deg) saturate(8) brightness(2.2);}
  16%{opacity:.65;clip-path:inset(68% 0 5% 0);transform:translateX(-15px);filter:hue-rotate(120deg);}
  25%{opacity:.3;clip-path:inset(15% 0 62% 0);transform:translateX(8px);}
  35%{opacity:0}}
@keyframes g3a{
  0%,100%{opacity:0}
  3%{opacity:.8;clip-path:inset(30% 0 45% 0);transform:translateX(-8px) scaleX(1.05);
    filter:hue-rotate(60deg) saturate(10) brightness(3);}
  10%{opacity:.6;clip-path:inset(62% 0 18% 0);transform:translateX(10px) scaleX(.95);
    filter:hue-rotate(300deg);}
  17%{opacity:.28;clip-path:inset(10% 0 78% 0);transform:translateX(-4px);}
  24%{opacity:0}}
@keyframes g4a{
  0%,100%{opacity:0}
  12%{opacity:.65;clip-path:inset(48% 0 38% 0);transform:translateX(5px);
    filter:hue-rotate(150deg) brightness(3.5);}
  20%{opacity:.4;clip-path:inset(80% 0 3% 0);transform:translateX(-8px);}
  30%{opacity:0}}
.kw{color:#569cd6}.fn{color:#dcdcaa}.st{color:#ce9178}
.tp{color:#4ec9b0}.cm{color:#608060}.nu{color:#b5cea8}
.vr{color:#9cdcfe}.pu{color:#c8c8c8}.ok{color:#00e87a}
.di{color:#3a5070}.cy{color:#00c8ff}
</style>
</head>
<body>
<div id="flash"></div>
<div id="scene">
  <div id="terminal">
    <div id="tbar">
      <div class="dot dr"></div><div class="dot dy"></div><div class="dot dg"></div>
      <div id="tbar-label">tobetech-platform — bash — 94x30</div>
    </div>
    <div id="code-wrap"><div id="code-out"></div></div>
    <div id="build-panel">
      <div class="bl" id="b1"></div><div class="bl" id="b2"></div>
      <div class="bl" id="b3"></div><div class="bl" id="b4"></div>
      <div id="prog-wrap">
        <div id="prog-bar"><div id="prog-fill"></div></div>
        <div id="prog-pct">0%</div>
      </div>
    </div>
  </div>
</div>
<div id="logo-scene">
  <canvas id="pcanvas"></canvas>
  <div id="rings-layer"></div>
  <div id="logo-wrap">
    <div id="glow"></div>
    <img id="g1" alt=""><img id="g2" alt=""><img id="g3" alt=""><img id="g4" alt="">
    <img id="logo-main" alt="ToBE Tech">
  </div>
</div>

async function buildTransparentLogo(){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const W=img.naturalWidth, H=img.naturalHeight;

      // ── Step 1: remove white background (colour-based) ──
      const c1=document.createElement('canvas');
      c1.width=W; c1.height=H;
      const ctx1=c1.getContext('2d');
      ctx1.drawImage(img,0,0);
      const d1=ctx1.getImageData(0,0,W,H), px=d1.data;
      for(let i=0;i<px.length;i+=4){
        const r=px[i],g=px[i+1],b=px[i+2];
        const minC=Math.min(r,g,b), sat=Math.max(r,g,b)-minC;
        if(minC>228){ px[i+3]=0; }
        else if(minC>180 && sat<80){
          const t=(minC-180)/48, s=Math.min(1,sat/80);
          px[i+3]=Math.max(0,Math.round(255*s*(1-t*0.98)));
        }
      }
      ctx1.putImageData(d1,0,0);

      // ── Step 2: blur the alpha channel to eliminate JPEG jaggy artifacts ──
      // Render the alpha as greyscale onto a fresh canvas, apply CSS blur,
      // then read back → the smooth luminance becomes the clean alpha mask.
      const cGrey=document.createElement('canvas');
      cGrey.width=W; cGrey.height=H;
      const ctxG=cGrey.getContext('2d');
      const dGrey=ctxG.createImageData(W,H);
      for(let i=0;i<px.length;i+=4){
        const a=d1.data[i+3];
        dGrey.data[i]=a; dGrey.data[i+1]=a; dGrey.data[i+2]=a; dGrey.data[i+3]=255;
      }
      ctxG.putImageData(dGrey,0,0);

      const cBlur=document.createElement('canvas');
      cBlur.width=W; cBlur.height=H;
      const ctxB=cBlur.getContext('2d');
      ctxB.filter='blur(2.5px)';
      ctxB.drawImage(cGrey,0,0);
      const dBlur=ctxB.getImageData(0,0,W,H);

      // ── Step 3: threshold blurred alpha → binary clean mask ──
      const THRESH=110; // tune: higher = more trimmed
      const a1=new Uint8Array(W*H);
      for(let i=0;i<dBlur.data.length;i+=4){
        a1[i>>2]=dBlur.data[i]>=THRESH?255:0; // R channel = blurred alpha value
      }
      // Write clean binary alpha back to pixel data
      for(let i=0;i<d1.data.length;i+=4) d1.data[i+3]=a1[i>>2];
      ctx1.putImageData(d1,0,0);

      // ── Step 4: dilate clean mask → white outline ring ──
      const DILATION=3;
      const a2=new Uint8Array(W*H);
      for(let y=0;y<H;y++){
        for(let x=0;x<W;x++){
          const idx=y*W+x;
          if(a1[idx]){a2[idx]=255;continue;}
          outer:for(let dy=-DILATION;dy<=DILATION;dy++){
            for(let dx=-DILATION;dx<=DILATION;dx++){
              if(dx*dx+dy*dy>DILATION*DILATION)continue;
              const nx=x+dx,ny=y+dy;
              if(nx>=0&&nx<W&&ny>=0&&ny<H&&a1[ny*W+nx]){a2[idx]=255;break outer;}
            }
          }
        }
      }

      // ── Step 5: compose — logo + white outline ──
      const cF=document.createElement('canvas');
      cF.width=W; cF.height=H;
      const ctxF=cF.getContext('2d');
      ctxF.drawImage(c1,0,0);
      const fd=ctxF.getImageData(0,0,W,H), fp=fd.data;
      for(let i=0;i<fp.length;i+=4){
        const idx=i>>2;
        if(a2[idx] && !a1[idx]){fp[i]=fp[i+1]=fp[i+2]=fp[i+3]=255;}
      }
      ctxF.putImageData(fd,0,0);
      resolve(cF.toDataURL('image/png'));
    };
    img.onerror=()=>resolve('data:image/jpeg;base64,'+LOGO_B64);
    img.src='data:image/jpeg;base64,'+LOGO_B64;
  });
}

function vis(h){return h.replace(/<[^>]*>/g,'').replace(/&[^;]+;/g,'X').length;}
const CURSOR='<span style="display:inline-block;width:7px;height:1.1em;background:var(--cyan);vertical-align:text-bottom;animation:cur .65s step-end infinite"></span>';
const MAX_LINES=14;
let allLines=[],curLine='';
const out=document.getElementById('code-out');
function render(){const v=allLines.slice(-MAX_LINES).join('\n');out.innerHTML=(v?v+'\n':'')+curLine+CURSOR;}

async function typeLine(html,ms){
  const n=vis(html);
  if(n===0){allLines.push('');render();return;}
  for(let t=1;t<=n;t++){
    let cnt=0,j=0,p='';
    while(j<html.length&&cnt<t){
      if(html[j]==='<'){const e=html.indexOf('>',j);p+=html.slice(j,e+1);j=e+1;}
      else if(html[j]==='&'){const e=html.indexOf(';',j);p+=html.slice(j,e+1);j=e+1;cnt++;}
      else{p+=html[j++];cnt++;}
    }
    const o=(p.match(/<span[^>]*>/g)||[]).length,cl=(p.match(/<\/span>/g)||[]).length;
    for(let k=0;k<o-cl;k++)p+='</span>';
    curLine=p;render();await sleep(ms);
  }
  allLines.push(html);curLine='';render();
}

class Particle{
  constructor(cx,cy,burst){
    const a=Math.random()*Math.PI*2,spd=burst?(5+Math.random()*15):(1.5+Math.random()*4);
    this.x=cx;this.y=cy;this.vx=Math.cos(a)*spd;this.vy=Math.sin(a)*spd;
    this.life=1;this.decay=burst?(0.007+Math.random()*0.013):(0.004+Math.random()*0.009);
    this.size=burst?(2+Math.random()*8):(1+Math.random()*3);
    const cols=['#1a56e8','#1a56e8','#00c8ff','#00c8ff','#4ec9b0','#ffffff','#7ab4ff','#00e87a'];
    this.color=cols[Math.floor(Math.random()*cols.length)];
    this.gravity=burst?0.15:0.03;this.trail=[];
  }
  update(){
    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>7)this.trail.shift();
    this.x+=this.vx;this.y+=this.vy;this.vy+=this.gravity;this.vx*=0.97;this.life-=this.decay;
  }
  draw(ctx){
    if(this.life<=0)return;
    for(let i=0;i<this.trail.length;i++){
      ctx.globalAlpha=this.life*(i/this.trail.length)*0.35;
      ctx.fillStyle=this.color;ctx.beginPath();
      ctx.arc(this.trail[i].x,this.trail[i].y,this.size*0.35,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=this.life;ctx.fillStyle=this.color;
    ctx.shadowColor=this.color;ctx.shadowBlur=14;
    ctx.beginPath();ctx.arc(this.x,this.y,this.size*this.life,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  }
}
let particles=[],pcanvas,pctx;
function initPC(){
  pcanvas=document.getElementById('pcanvas');
  pcanvas.width=window.innerWidth;pcanvas.height=window.innerHeight;
  pctx=pcanvas.getContext('2d');
}
function burst(n,b){const cx=pcanvas.width/2,cy=pcanvas.height/2;for(let i=0;i<n;i++)particles.push(new Particle(cx,cy,b));}
function animP(){
  pctx.clearRect(0,0,pcanvas.width,pcanvas.height);
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{p.update();p.draw(pctx);});
  pctx.globalAlpha=1;
  if(particles.length>0)requestAnimationFrame(animP);
}

    L.appendChild(r);
  });
}
